name: Markdown Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run markdownlint
      uses: nosborn/github-action-markdown-cli@v3.3.0
      with:
        files: .
        config_file: ".markdownlint.json"
        ignore_files: "node_modules"
